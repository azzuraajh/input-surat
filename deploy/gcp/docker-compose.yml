services:
  gateway:
    image: nginx:1.27-alpine
    container_name: input-surat-gateway
    depends_on:
      app:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-18082}:80"
    restart: unless-stopped
    volumes:
      - ./gateway.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: input-surat-app
    environment:
      APP_NAME: Input Surat
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${PUBLIC_ORIGIN}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Jakarta}"
      APP_LOCALE: "${APP_LOCALE:-id}"
      APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-id}"
      APP_FAKER_LOCALE: "${APP_FAKER_LOCALE:-id_ID}"
      DB_CONNECTION: sqlite
      DB_DATABASE: "${DB_DATABASE:-/var/www/html/database/runtime/database.sqlite}"
      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
      ADMIN_NAME: "${ADMIN_NAME:-Administrator}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@input-surat.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-me-now}"
    command: >
      sh -c "
      mkdir -p /var/www/html/database/runtime &&
      mkdir -p /var/www/html/storage/logs &&
      mkdir -p /var/www/html/storage/framework/cache &&
      mkdir -p /var/www/html/storage/framework/sessions &&
      mkdir -p /var/www/html/storage/framework/views &&
      touch /var/www/html/database/runtime/database.sqlite &&
      /var/www/html/docker/start-app.sh
      "
    restart: unless-stopped
    volumes:
      - ./runtime/database:/var/www/html/database/runtime
      - input_surat_storage:/var/www/html/storage

volumes:
  input_surat_storage:
