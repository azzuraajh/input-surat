services:
  api-gateway:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Input Surat
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_TIMEZONE: Asia/Jakarta
      APP_LOCALE: id
      APP_FALLBACK_LOCALE: id
      APP_FAKER_LOCALE: id_ID
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: input_surat
      DB_USERNAME: input_surat
      DB_PASSWORD: input_surat
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      ADMIN_NAME: Administrator
      ADMIN_EMAIL: admin@input-surat.local
      ADMIN_PASSWORD: change-me-now
    expose:
      - "8000"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: input_surat
      MYSQL_USER: input_surat
      MYSQL_PASSWORD: input_surat
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
